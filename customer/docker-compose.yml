services:
  nanoclaw:
    build:
      context: ..
      dockerfile: customer/Dockerfile
    image: nanoclaw-customer:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "3002:3002"  # lead dashboard
      - "3003:3003"  # public chat API
    volumes:
      - ./data:/app/data
      - ./groups:/app/groups
      - ./store:/app/store
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
