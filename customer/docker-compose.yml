services:
  nanoclaw:
    build:
      context: ..
      dockerfile: customer/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./groups:/app/groups
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: journald
      options:
        tag: "{{.Name}}"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
